<!-- Client Details Section -->

<div class="clients-details">
<h1 id="name"></h1>
<p id="work"></p>
<p id="amount"></p>
<p id="date"></p>
<p id="status"></p></div>


<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
console.log("ID from URL:", id);

const clients = JSON.parse(localStorage.getItem("clients")) || [];
console.log("Clients from localStorage:", clients);

const client = clients.find(c => c.id === Number(id));
console.log("Found client:", client);

if (client) {
  document.getElementById('name').textContent = client.name;
  document.getElementById('work').textContent = client.aboutWork;
  document.getElementById('amount').textContent = "Amount: ₹" + client.amount;
  document.getElementById('date').textContent = "Submit Date: " + client.submitDate;
  document.getElementById('status').textContent = "Status: " + client.status;
} else {
  document.getElementById('name').textContent = "Client not found";
}
</script>
